name: Daily competitor intel update

on:
  schedule:
    # 09:30, 14:30, 20:30 Asia/Shanghai.
    - cron: "30 1 * * *"
    - cron: "30 6 * * *"
    - cron: "30 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh candidate intel
        run: python auto_update_intel.py --dashboard index.html

      - name: Commit changes
        run: |
          if git diff --quiet -- index.html; then
            echo "No dashboard changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: update daily competitor intel"
          git push
