name: Daily competitor intel update

on:
  schedule:
    # 09:30, 14:30, 20:30 Asia/Shanghai.
    - cron: "30 1 * * *"
    - cron: "30 6 * * *"
    - cron: "30 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Refresh candidate intel
        run: python auto_update_intel.py --dashboard index.html

      - name: Refresh WeChat source links
        run: |
          CHROME_BIN="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser || true)"
          if [ -z "$CHROME_BIN" ]; then
            echo "Chrome is not available on this runner; keeping temporary WeChat links."
            exit 0
          fi
          node scripts/scrape-wechat-chrome.cjs \
            --from-dashboard \
            --dashboard index.html \
            --chrome "$CHROME_BIN" \
            --limit 20 || echo "Some WeChat links could not be refreshed this run."

      - name: Commit changes
        run: |
          if git diff --quiet -- index.html; then
            echo "No dashboard changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: update daily competitor intel"
          git push
